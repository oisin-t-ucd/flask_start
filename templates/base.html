<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}To-Do Manager{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <nav>
            <ul>
                <!-- Updated navigation to reflect To-Do routes -->
                <li><a href="{{ url_for('index') }}">My Tasks</a></li>
                <li><a href="{{ url_for('search') }}">Search Tasks</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Flash messages for task updates or deletions -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <ul class="flashes">
            {% for message in messages %}
              <li>{{ message }}</li>
            {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        {% block content %}
        <!-- Child templates (index, edit, search) will inject content here -->
        {% endblock %}
    </main>

</body>
</html>
