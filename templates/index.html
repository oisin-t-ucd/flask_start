{% extends "base.html" %} 
{% block title %}Home - User List{% endblock %} 
{% block content %}
<h1>User Directory</h1>

<div style="margin-bottom: 20px;">
  <a href="{{ url_for('search') }}" class="btn-edit" style="display: inline-block; padding: 10px 15px; background-color: #28a745; color: white; text-decoration: none; border-radius: 4px;">
    🔍 Search/Filter Users
  </a>
</div>

<div class="form-container">
  <form action="/" method="POST">
    <input type="text" name="name" placeholder="Enter Name" required />
    <input type="number" name="age" placeholder="Enter Age" required />
    <input type="text" name="job" placeholder="Enter Job" />
    <button type="submit" class="btn-add">Add User</button>
  </form>
</div>
<ul class="user-list">
  {% for user in users %}
  <li>
    <span class="user-info">
      <a href="{{ url_for('user_profile', user_index=loop.index0) }}">
        <strong>{{ user.name }}</strong>
      </a>
      ({{ user.age }})
    </span>
    <a class="btn-edit" href="{{ url_for('edit_user', user_index=loop.index0) }}">Edit</a>
    <button class="btn-delete" data-index="{{ loop.index0 }}" data-name="{{ user.name }}">Delete</button>
  </li>
  {% endfor %}
</ul>

<!-- Delete Confirmation Modal -->
<div id="deleteModal" class="modal">
  <div class="modal-content">
    <p>Are you sure you want to delete <span id="userName"></span>?</p>
    <button id="noBtn">No</button>
    <button id="yesBtn">Yes</button>
  </div>
</div>

<form id="deleteForm" method="POST" action="/delete/0"></form>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
{% endblock %}
